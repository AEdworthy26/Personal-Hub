<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RICS Study Log — Personal Hub</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink:   #0d0d0d; --paper: #f4f0e6; --rule: #1a1a1a;
      --muted: #555;    --light: #888;    --blue: #003399;
    }
    body { background: var(--paper); color: var(--ink); font-family: 'Source Serif 4', Georgia, serif; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Ticker ── */
    .ticker-wrap { background: #111; overflow: hidden; display: flex; align-items: stretch; height: 2.4rem; }
    .ticker-label { background: #e8000d; color: #fff; font-family: 'Source Serif 4', serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; padding: 0 1.2rem; display: flex; align-items: center; white-space: nowrap; flex-shrink: 0; gap: 0.5rem; }
    .ticker-label::before { content: ''; display: inline-block; width: 7px; height: 7px; background: #fff; border-radius: 50%; animation: pulse-dot 1.2s ease-in-out infinite; }
    @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)} }
    .ticker-inner { overflow: hidden; flex: 1; display: flex; align-items: center; }
    .ticker-track { display: flex; align-items: center; white-space: nowrap; will-change: transform; animation: ticker-scroll 40s linear infinite; }
    .ticker-track:hover { animation-play-state: paused; }
    .ticker-track a { color: #fff; font-family: 'Source Serif 4', serif; font-size: 0.78rem; font-weight: 600; padding: 0 2rem; }
    .ticker-track a:hover { color: #e8000d; text-decoration: none; }
    .ticker-track .ticker-sep { color: #e8000d; font-size: 1rem; font-weight: 700; flex-shrink: 0; }
    @keyframes ticker-scroll { 0%{transform:translateX(0)}100%{transform:translateX(-50%)} }

    /* ── Header ── */
    .meta-bar { max-width: 1200px; margin: 0 auto; padding: 1rem 1.5rem 0; }
    .meta-bar-inner { display: flex; justify-content: space-between; align-items: center; font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--rule); padding-bottom: 0.4rem; margin-bottom: 0.6rem; }
    .masthead-wrap { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; text-align: center; }
    .masthead { font-family: 'Playfair Display', Georgia, serif; font-weight: 900; font-size: clamp(2.4rem, 5vw, 4.2rem); line-height: 1; }
    .masthead-sub { font-size: 0.75rem; font-style: italic; color: var(--muted); margin-top: 0.2rem; margin-bottom: 0.3rem; }
    .rule-single { border: none; border-top: 1px solid var(--rule); margin: 0.3rem 0; }
    .rule-double { border: none; border-top: 3px double var(--rule); max-width: 1200px; margin: 0 auto; }

    /* ── Nav ── */
    .nav-ribbon { background: linear-gradient(90deg,#4b5563 0%,#1f2937 100%); }
    .nav-ribbon nav { max-width: 1600px; margin: 0 auto; padding: 0 2rem; display: flex; align-items: center; justify-content: center; gap: 0.3rem; }
    .nav-ribbon nav a { color: rgba(255,255,255,0.9); font-family: system-ui,sans-serif; font-size: 0.8rem; font-weight: 500; letter-spacing: 0.04em; text-transform: uppercase; padding: 0.5rem 0.95rem; border-radius: 5px; transition: background 0.15s; white-space: nowrap; }
    .nav-ribbon nav a:hover { background: rgba(255,255,255,0.18); color: #fff; text-decoration: none; }
    .nav-ribbon nav a.nav-home { color: #fff; font-weight: 700; margin-right: 0.4rem; padding-right: 1rem; border-right: 1px solid rgba(255,255,255,0.25); border-radius: 0; }
    .nav-ribbon nav a.nav-active { background: rgba(255,255,255,0.22); }

    /* ── Page ── */
    .page-wrap { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
    .page-header { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 2px solid var(--rule); }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; }
    .page-header p { color: var(--muted); font-size: 0.88rem; margin-top: 0.4rem; }

    /* ── Filters ── */
    .log-filters { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .filter-btn { font-family: 'Source Serif 4', serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.3rem 0.8rem; border-radius: 3px; border: 1px solid #bbb; background: transparent; cursor: pointer; color: var(--muted); transition: all 0.15s; }
    .filter-btn:hover, .filter-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .filter-btn.l3.active { background: #dc2626; border-color: #dc2626; }
    .filter-btn.l2.active { background: #1d4ed8; border-color: #1d4ed8; }
    .filter-btn.l1.active { background: #15803d; border-color: #15803d; }

    /* ── Log entries ── */
    .log-entry { border: 1px solid #d8d4ca; border-radius: 8px; margin-bottom: 1rem; overflow: hidden; background: #fff; }
    .log-entry-header { display: flex; align-items: center; gap: 0.8rem; padding: 1rem 1.2rem; cursor: pointer; user-select: none; }
    .log-entry-header:hover { background: #faf8f4; }
    .log-date { font-size: 0.68rem; color: var(--light); letter-spacing: 0.1em; text-transform: uppercase; white-space: nowrap; min-width: 5.5rem; }
    .log-level { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; padding: 0.18rem 0.5rem; border-radius: 2px; border: 1px solid currentColor; white-space: nowrap; }
    .log-level.l3 { color: #dc2626; }
    .log-level.l2 { color: #1d4ed8; }
    .log-level.l1 { color: #15803d; }
    .log-topic { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; flex: 1; }
    .log-module { font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
    .log-chevron { font-size: 0.75rem; color: var(--light); transition: transform 0.2s; flex-shrink: 0; }
    .log-entry.open .log-chevron { transform: rotate(180deg); }

    .log-body { display: none; padding: 0 1.2rem 1.2rem; border-top: 1px solid #ece8e0; }
    .log-entry.open .log-body { display: block; }
    .log-focus { font-size: 0.88rem; color: var(--muted); font-style: italic; margin: 0.8rem 0 1rem; line-height: 1.6; }
    .log-image { width: 100%; max-height: 200px; object-fit: cover; border-radius: 5px; margin-bottom: 1rem; }

    .log-section-title { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: var(--light); margin: 1rem 0 0.5rem; }
    .log-summary-list { list-style: none; display: flex; flex-direction: column; gap: 0.3rem; }
    .log-summary-list li { font-size: 0.84rem; padding: 0.35rem 0.6rem 0.35rem 1rem; border-left: 2px solid #003399; background: #f4f0e6; border-radius: 0 3px 3px 0; line-height: 1.5; }

    .log-qa { display: flex; flex-direction: column; gap: 0.6rem; }
    .log-qa-item { border: 1px solid #e0dcd4; border-radius: 5px; overflow: hidden; }
    .log-qa-q { font-size: 0.82rem; font-weight: 600; padding: 0.55rem 0.8rem; background: #f4f0e6; border-bottom: 1px solid #e0dcd4; line-height: 1.4; }
    .log-qa-a { font-size: 0.82rem; padding: 0.55rem 0.8rem; color: var(--muted); line-height: 1.5; }

    .log-today-link { display: inline-block; margin-top: 1rem; font-size: 0.78rem; font-weight: 700; color: var(--blue); letter-spacing: 0.04em; }
    .log-today-link:hover { text-decoration: underline; }

    .log-empty { text-align: center; padding: 3rem 1rem; color: var(--light); font-style: italic; }
  </style>
</head>
<body>

  <div class="ticker-wrap">
    <div class="ticker-label">Live</div>
    <div class="ticker-inner"><div class="ticker-track" id="ticker-track"></div></div>
  </div>

  <div class="meta-bar">
    <div class="meta-bar-inner">
      <span id="js-date"></span>
      <span>RICS APC · Planning & Development Pathway</span>
    </div>
  </div>
  <div class="masthead-wrap">
    <div class="masthead">Personal Hub</div>
    <div class="masthead-sub">— study, grow, deliver —</div>
    <hr class="rule-single">
  </div>
  <hr class="rule-double">

  <div class="nav-ribbon">
    <nav>
      <a href="personal_hub.html" class="nav-home">Home</a>
      <a href="rics-study.html">RICS Study</a>
      <a href="rics-log.html" class="nav-active">Study Log</a>
    </nav>
  </div>

  <div class="page-wrap">
    <div class="page-header">
      <h1>RICS Study Log</h1>
      <p>Every daily lesson is saved here automatically. Revisit past topics, refresh your Q&amp;A, and track your coverage across all competencies.</p>
    </div>

    <div class="log-filters" id="log-filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn l3" data-filter="3" onclick="setFilter('3',this)">Level 3</button>
      <button class="filter-btn l2" data-filter="2" onclick="setFilter('2',this)">Level 2</button>
      <button class="filter-btn l1" data-filter="1" onclick="setFilter('1',this)">Level 1</button>
    </div>

    <div id="log-list"></div>
  </div>

  <script src="ticker.js?v=202604100509"></script>
  <script src="rics-log.js?v=202604100509"></script>
  <script>
    document.getElementById('js-date').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'});

    function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    var currentFilter = 'all';

    function setFilter(val, btn) {
      currentFilter = val;
      document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      render();
    }

    function render() {
      var el = document.getElementById('log-list');
      var entries = (typeof RICS_LOG !== 'undefined') ? RICS_LOG : [];

      if (currentFilter !== 'all') {
        entries = entries.filter(function(e){ return String(e.level) === currentFilter; });
      }

      if (entries.length === 0) {
        el.innerHTML = '<div class="log-empty">No lessons logged yet — lessons appear here automatically after each daily update.</div>';
        return;
      }

      el.innerHTML = entries.map(function(e, i) {
        var dateStr = e.date ? new Date(e.date + 'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}) : '';
        var lvlClass = 'l' + (e.level || 1);
        var lvlLabel = 'Level ' + (e.level || '?');

        var summaryHTML = (e.summary && e.summary.length)
          ? '<p class="log-section-title">Key Points</p><ul class="log-summary-list">'
            + e.summary.map(function(s){ return '<li>' + esc(s) + '</li>'; }).join('')
            + '</ul>'
          : '';

        var qaHTML = (e.qa && e.qa.length)
          ? '<p class="log-section-title">APC Q&amp;A</p><div class="log-qa">'
            + e.qa.map(function(q){ return '<div class="log-qa-item"><div class="log-qa-q">Q: ' + esc(q.q) + '</div><div class="log-qa-a">A: ' + esc(q.a) + '</div></div>'; }).join('')
            + '</div>'
          : '';

        var imgHTML = e.image ? '<img class="log-image" src="' + esc(e.image) + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">' : '';

        var isToday = e.date === new Date().toISOString().slice(0,10);
        var todayLink = isToday ? '<a href="rics-study.html" class="log-today-link">Read full lesson \u2192</a>' : '';

        return '<div class="log-entry" id="entry-' + i + '">'
          + '<div class="log-entry-header" onclick="toggle(' + i + ')">'
          +   '<span class="log-date">' + esc(dateStr) + '</span>'
          +   '<span class="log-level ' + lvlClass + '">' + lvlLabel + '</span>'
          +   '<span class="log-topic">' + esc(e.topic) + '</span>'
          +   '<span class="log-module">' + esc(e.module) + '</span>'
          +   '<span class="log-chevron">&#9660;</span>'
          + '</div>'
          + '<div class="log-body">'
          +   imgHTML
          +   (e.focus ? '<p class="log-focus">' + esc(e.focus) + '</p>' : '')
          +   summaryHTML
          +   qaHTML
          +   todayLink
          + '</div>'
          + '</div>';
      }).join('');
    }

    function toggle(i) {
      var el = document.getElementById('entry-' + i);
      el.classList.toggle('open');
    }

    render();
  </script>
</body>
</html>
